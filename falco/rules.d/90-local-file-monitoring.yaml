- rule: Monitor specific file access
  desc: Detect when /etc/tmp_rzh is opened for reading or writing
  condition: >
    evt.type in (open, openat, openat2)
    and fd.name = "/etc/tmp_rzh"
    and (evt.is_open_read = true or evt.is_open_write = true)
  output: >
    Sensitive file opened
    (file=%fd.name access=%evt.type user=%user.name
    process=%proc.name command=%proc.cmdline)
  priority: WARNING
  source: syscall
  tags: [filesystem, host, security]
